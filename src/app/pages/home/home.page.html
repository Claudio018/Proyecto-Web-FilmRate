<ion-content [fullscreen]="true">
  <ion-grid fixed>
    <ion-row>
      <ion-col 
        size="12" size-sm="6" size-md="4" size-lg="3" size-xl="2"
        *ngFor="let movie of movies">
        <ion-card class="movie-card">
          <img [src]="movie.image" alt="{{movie.title}}" />
          <ion-card-content>
            <p class="movie-title">{{ movie.title }}</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
